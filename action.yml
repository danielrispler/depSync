name: 'depSync'
description: 'Context-Aware AI Dependency Manager for Monorepos'
author: 'Your Name'

inputs:
  github-token:
    description: 'GitHub token for API access (usually secrets.GITHUB_TOKEN)'
    required: true
  jules-api-key:
    description: 'Jules REST API Key for autonomous AI dependency analysis'
    required: true
  webhook-url:
    description: 'Webhook URL for push notifications (Discord/Slack)'
    required: false

runs:
  using: 'node24'
  main: 'dist/index.js'